<html>
    <head>
        <title>Minamotion - Browser</title>
        <link rel="stylesheet" href="/assets/stylesheets/main.css">
        <link rel="stylesheet" href="/assets/stylesheets/dialog.css">
		<link rel="icon" href="/assets/images/minamotion_logo.png">
    </head>
    <body id="body">
        <page id="main">
            <div class="wrap header">
                <img src="/assets/images/minamotion_logo.png" width="100" height="100">
                <div class="center-child" style="width: 300px;">
                    <div class="wrap" style="justify-content: center; align-content: center;">
                        <img src="/assets/images/minamotion_fn.png" width="240" height="80">
                        <p style="margin: 0"><a href="https://www.youtube.com/@official_multilayer" title="The website I post videos on">YouTube</a> | <a href="https://scratch.mit.edu/users/MultiLayerScratch" title="The website I post most of my games on">Scratch</a> | <a href="https://github.com/Minamotion" title="The website I post websites on (Like this one!)">Github</a></p>
                    </div>
                </div>
            </div>
            <div id="contents">
                <div style="margin:24;" class="center-child">
                    <div>
                        <img src="/assets/images/minamotion_fn.png" width="240" height="80" style="margin:12">
                        <div class="wrap">
                            <input type="search" id="searchinput" disabled>
                            <button class="button" id="searchongooglebutton" style="width:200px;height:50px" onclick="location.assign('https:\/\/google.com/search?q='+document.getElementById('searchinput').value)">Search in Google</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="wrap footer">
                <div class="hfButtons"></div>
            </div>
        </page>
        <script async>
            window.addEventListener('load',function(){document.getElementById('searchinput').removeAttribute('disabled')})
        </script>
    </body>
</html>
